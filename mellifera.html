<body>
<script>
/* Set up initial test data used by the example Mellifera program. */
"use strict";

const init = () => {
    console.log("Initializing test data...");
    function TestObject() {
        this["undefined"] = undefined;
        this["null"] = null;
        this["boolean"] = false;
        this["number"] = 123;
        this["string"] = "JavaScript string";
        this["array"] = [
            "array element 0",
            "array element 1",
            "array element 2"
        ];
        this["object"] = {
            foo: "object foo value",
            bar: "object bar value",
            baz: "object baz value",
        };
        this["function"] = (msg) => {
            console.log(`console.log-ed "${msg}" with the value of this being...`, this);
            return "function return value";
        };
    }
    window.test = new TestObject();
    console.log("window.test is:", window.test);
};

init();
</script>
<script src="wasm_exec.js"></script>
<script>
console.log("Initializing Mellifera Wasm module...");
mellifera = {
    eval: (source, options) => { throw new Error("Mellifera Wasm module is not initialized!"); }
};
const go = new Go();
WebAssembly.instantiateStreaming(fetch("mellifera.wasm"), go.importObject).then(async result => {
    let module = result.module;
    let instance = result.instance;
    await go.run(instance);
});
</script>

# call document.getElementById("program") to get the current <textarea>
let program = js::global().get("document").call("getElementById", [js::from_mellifera("program")]);
# update the <textarea> contents with a 🐝
let program_text = js::into_mellifera(program.get("value"));
let updated_text = program_text + "# 🐝 💬Hello there!\n";
program.set("value", js::from_mellifera(updated_text));
</textarea>
<button onClick='mellifera.eval(document.getElementById("program").value, {stdout: "output", stderr: "output"});'>Run</button>
